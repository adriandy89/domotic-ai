# ─────────────────────────────────────────────────────────────────────────────
# Domotic-AI edge broker (mosquitto)
#
# Local MQTT broker that runs in the customer's home. zigbee2mqtt (and the other
# bridges) publish HERE instead of directly to TBMQ. A store-and-forward bridge
# relays everything to/from the central TBMQ broker over the internet — and
# QUEUES messages while the internet is down, delivering them on reconnect.
#
# Placeholders to replace per-home (from the dashboard → Integrations → Edge):
#   HOME_UNIQUE_ID       the home unique_id (also the MQTT username)
#   HOME_MQTT_PASSWORD   the home MQTT password (same one zigbee2mqtt used)
#   your-tbmq-server.com the central TBMQ host
# ─────────────────────────────────────────────────────────────────────────────

# ── Local listener ───────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords

# ── Bridge to central TBMQ (store-and-forward) ───────────────────────────────
connection central-bridge
address your-tbmq-server.com:1883
remote_username HOME_UNIQUE_ID
remote_password HOME_MQTT_PASSWORD
# Distinct client id for the bridge session (username is shared across bridges).
remote_clientid HOME_UNIQUE_ID-bridge

# Same topic namespace zigbee2mqtt used directly against TBMQ:
#   telemetry goes UP, commands + the retained edge-rules bundle come DOWN.
topic home/id/HOME_UNIQUE_ID/# both 1

# Persist the bridge session so TBMQ keeps our subscriptions and queued messages
# across reconnects. try_private=false because TBMQ is not a mosquitto peer.
try_private false
start_type automatic
restart_timeout 5 30
cleansession false
notifications false

# Queue while offline: bound the backlog so a long outage can't exhaust disk.
max_queued_messages 100000
max_inflight_messages 0
bridge_qos 1
local_cleansession false
