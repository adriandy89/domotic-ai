server {
    listen       80;
    server_name  localhost;

    # El shell HTML y el SW/manifest deben revalidar siempre para que un nuevo
    # despliegue se propague de inmediato en vez de servirse cacheado.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
    }
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
    }
    location = /registerSW.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
    }
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        types { } default_type application/manifest+json;
    }

    # version.json es la sonda de versión en runtime: NUNCA debe cachearse
    # (ni el navegador, ni un CDN) o la detección de versión deja de funcionar.
    location = /version.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        types { } default_type application/json;
    }

    # workbox-<hash>.js tiene hash de contenido: seguro para cache permanente.
    location ^~ /workbox- {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Vite emite nombres con hash bajo /assets/: seguro para cache permanente.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Las rutas profundas del SPA reciben aquí el shell HTML (no vía
    # "location = /index.html"), así que también deben revalidar para evitar un
    # shell viejo apuntando a assets antiguos.
    location / {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html /index-*.html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}
